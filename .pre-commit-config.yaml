repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: mixed-line-ending

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.1
    hooks:
      - id: ruff-format
        args: [python/, tests/]
      - id: ruff
        name: ruff (imports)
        args: [--select, I, --fix, --exit-non-zero-on-fix, python/, tests/]

  - repo: local
    hooks:
      - id: ty
        name: ty type check
        entry: uv run ty check python/ tests/
        language: system
        pass_filenames: false
        types: [python]

  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v19.1.6
    hooks:
      - id: clang-format
        types_or: [c++, c]
        files: ^src/.*\.(cpp|hpp|h|cc|cxx)$
